name: CI

on:
  pull_request:
  push:
    branches: [main, tai_lieu_v1, "codex/**"]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Ho_Chi_Minh
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:e2e:list
      - run: npm run build:all
      - run: npm run verify:nas-build
      - name: Secret scan
        shell: bash
        run: |
          set -euo pipefail
          # Ignore hardening plan meta-examples and doc placeholders like DATABASE_URL='<...>'.
          matches="$(git grep -nE '(service_role|SERVICE_ROLE_KEY|E2E_ADMIN_PASSWORD|DATABASE_URL)=.+' \
            -- ':!package-lock.json' ':!docs/superpowers/plans/**' || true)"
          filtered="$(printf '%s\n' "$matches" | grep -vE "DATABASE_URL=['\"]?<" || true)"
          if [ -n "$filtered" ]; then
            printf '%s\n' "$filtered"
            echo "Potential committed secret assignment found."
            exit 1
          fi
