services:
  postgres:
    image: postgres:16
    container_name: qcvl-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "55433:5432"
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qcoms_dev -d qcoms_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${QCVL_APP_IMAGE_REF:?QCVL_APP_IMAGE_REF is required}
    container_name: qcvl-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 3100
      VITE_API_BASE_URL: http://100.84.228.125:3200
      VITE_APP_ENV: nas-dev
      DATABASE_URL: postgres://${POSTGRES_USER:-qcoms_dev}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qcoms_dev}
    ports:
      - "3200:3100"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3100/api/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s