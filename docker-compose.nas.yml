services:
  postgres:
    image: postgres:16
    container_name: qcvl-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "55433:5432"
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qcoms_dev -d qcoms_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: node:22-bookworm-slim
    container_name: qcvl-app
    restart: unless-stopped
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 3100
      VITE_API_BASE_URL: http://100.84.228.125:3200
      VITE_APP_ENV: nas-dev
      DATABASE_URL: postgres://${POSTGRES_USER:-qcoms_dev}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qcoms_dev}
    command: sh -c "npm ci && npm run build:all && npm run api:start"
    ports:
      - "3200:3100"
    volumes:
      - ./app:/app
